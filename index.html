<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MACI | Slides & Video</title>
  <meta name="description" content="Slides and video for the MACI paper" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0f11;
      --panel: #151518;
      --panel-dark: #0b0b0c;
      --text-main: #ffffff;
      --text-muted: #a0a0a0;
      --border: rgba(255,255,255,0.10);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text-main);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      display: grid;
      grid-template-rows: auto 1fr;
      height: 100vh;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      background: rgba(15,15,17,0.92);
      backdrop-filter: blur(8px);
    }

    .topbar-left h1 {
      font-size: 1rem;
      line-height: 1.35;
      font-weight: 800;
    }

    .topbar-left p {
      font-size: 0.88rem;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .pill {
      font-size: 0.88rem;
      color: var(--text-muted);
      border: 1px solid var(--border);
      padding: 8px 12px;
      border-radius: 999px;
      transition: 0.2s ease;
      white-space: nowrap;
    }

    .pill:hover {
      color: var(--text-main);
      border-color: rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.04);
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 0;
      height: 100%;
    }

    .panel {
      min-width: 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
      background: var(--panel);
      border-right: 1px solid var(--border);
    }

    .panel:last-child {
      border-right: none;
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      background: rgba(255,255,255,0.02);
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .panel-body {
      flex: 1;
      min-height: 0;
      background: var(--panel-dark);
      overflow: hidden;
    }

    .video-wrap,
    .pdf-wrap {
      width: 100%;
      height: 100%;
      background: #000;
    }

    .video-wrap iframe,
    .pdf-wrap iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }

    @media (max-width: 900px) {
      .page {
        height: auto;
        min-height: 100vh;
      }

      .layout {
        grid-template-columns: 1fr;
        grid-template-rows: 52vh 70vh;
      }

      .panel {
        border-right: none;
        border-bottom: 1px solid var(--border);
      }

      .panel:last-child {
        border-bottom: none;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .topbar-right {
        justify-content: flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div class="topbar-left">
        <h1>Multi-LLM Adaptive Conformal Inference for Reliable LLM Responses</h1>
        <p>5-minute pitch video and slides</p>
      </div>

      <div class="topbar-right">
        <a class="pill" href="https://youtu.be/NGpkGqoIin0?si=dzbokfB1KNyKvsjm" target="_blank" rel="noopener noreferrer">Open YouTube</a>
        <a class="pill" href="slides.pdf" target="_blank" rel="noopener noreferrer">Open Slides PDF</a>
      </div>
    </div>

    <div class="layout">
      <section class="panel">
        <div class="panel-header">
          <span>Video</span>
          <span>YouTube embed</span>
        </div>
        <div class="panel-body">
          <div class="video-wrap">
            <iframe
              src="https://www.youtube.com/embed/NGpkGqoIin0"
              title="MACI presentation video"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
              allowfullscreen>
            </iframe>
          </div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-header">
          <span>Slides</span>
          <span>PDF viewer</span>
        </div>
        <div class="panel-body">
          <div class="pdf-wrap">
            <iframe
              src="slides.pdf"
              title="Slides PDF">
            </iframe>
          </div>
        </div>
      </section>
    </div>
  </div>
</body>
</html>
